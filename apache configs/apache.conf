<VirtualHost *:443>
        ServerAdmin webmaster@localhost

        DocumentRoot /var/www/frontend

#        <Directory /var/www/frontend>
#                Options FollowSymLinks
#                AllowOverride All
#                Require all granted
#        </Directory>

        Alias /editor /var/www/frontend/editor
        <Directory /var/www/frontend/editor>
                Options Indexes FollowSymLinks
                AllowOverride All
                Require all granted
                
                <IfModule mod_rewrite.c>
                        RewriteEngine On
                        RewriteBase /editor/
                        RewriteRule ^index\.html$ - [L]
                        RewriteCond %{REQUEST_FILENAME} !-f
                        RewriteCond %{REQUEST_FILENAME} !-d
                        RewriteRule . /editor/index.html [L]
                </IfModule>
        </Directory>


        Alias /viewer /var/www/frontend/viewer
        <Directory /var/www/frontend/viewer>
                Options Indexes FollowSymLinks
                AllowOverride All
                Require all granted

                <IfModule mod_rewrite.c>
                        RewriteEngine On
                        RewriteBase /viewer/
                        RewriteRule ^index\.html$ - [L]
                        RewriteCond %{REQUEST_FILENAME} !-f
                        RewriteCond %{REQUEST_FILENAME} !-d
                        RewriteRule . /viewer/index.html [L]
                </IfModule>
        </Directory>
       
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        SSLEngine on

        SSLCertificateFile      /home/webadmin/certs/vue-ar.crt
        SSLCertificateKeyFile   /home/webadmin/certs/vue-ar.key
        <FilesMatch "\.(?:cgi|shtml|phtml|php)$">
                SSLOptions +StdEnvVars
        </FilesMatch>
        <Directory /usr/lib/cgi-bin>
                SSLOptions +StdEnvVars
        </Directory>
</VirtualHost>
